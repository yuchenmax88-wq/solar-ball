[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

board_build.src_dir = main

; Build flags
build_flags =
    -DCONFIG_LOG_DEFAULT_LEVEL=3
    -Os

; Libraries (managed via platformio lib deps)
lib_deps =

; Serial port (adjust to your system)
upload_port = COM3
monitor_port = COM3
